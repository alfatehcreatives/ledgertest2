<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asim's Ledger</title>
    
    <!-- PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Asim Ledger">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/583/583985.png">
    
    <!-- CDN Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(24, 24, 27, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--bg);
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            color: #f1f5f9;
            overscroll-behavior-y: contain;
        }
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border);
        }
        .tab-active {
            background: #ffffff !important;
            color: #000000 !important;
            box-shadow: 0 0 20px rgba(255,255,255,0.15);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-pop { animation: pop 0.2s ease-out; }
        @keyframes pop {
            0% { transform: scale(0.98); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="w-full max-w-5xl mx-auto pt-8 px-6 pb-4">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 id="view-title" class="text-3xl font-black tracking-tight text-white">Memos</h1>
                <p class="text-xs text-zinc-500 font-bold uppercase tracking-widest mt-1">Asim's Ledger</p>
            </div>
            <div class="flex gap-2">
                <button onclick="requestNotificationPermission()" class="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-zinc-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-bell"></i>
                </button>
                <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-black text-xs font-bold shadow-lg">AL</div>
            </div>
        </div>
        
        <div class="relative group max-w-md">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 text-sm"></i>
            <input type="text" id="search-input" oninput="render()" placeholder="Search records..." 
                class="w-full bg-zinc-900 border border-zinc-800 shadow-inner py-4 pl-12 pr-4 rounded-2xl text-sm text-white focus:outline-none focus:ring-1 ring-white/20 transition-all">
        </div>
    </header>

    <main id="content-area" class="flex-1 w-full max-w-5xl mx-auto px-6 pb-32 overflow-y-auto no-scrollbar"></main>

    <div class="fixed bottom-0 left-0 right-0 p-6 flex flex-col items-center pointer-events-none">
        <button onclick="openModal()" class="pointer-events-auto mb-6 w-14 h-14 bg-white text-black rounded-full shadow-[0_0_25px_rgba(255,255,255,0.2)] flex items-center justify-center text-xl hover:scale-110 active:scale-95 transition-all">
            <i class="fa-solid fa-plus"></i>
        </button>

        <nav class="pointer-events-auto w-full max-w-lg h-16 glass-panel rounded-full flex items-center justify-around px-2 shadow-2xl">
            <button onclick="setView('memos')" id="nav-memos" class="w-12 h-12 rounded-full flex items-center justify-center transition-all"><i class="fa-solid fa-book-open"></i></button>
            <button onclick="setView('projects')" id="nav-projects" class="w-12 h-12 rounded-full flex items-center justify-center transition-all"><i class="fa-solid fa-diagram-project"></i></button>
            <button onclick="setView('ledger')" id="nav-ledger" class="w-12 h-12 rounded-full flex items-center justify-center transition-all"><i class="fa-solid fa-wallet"></i></button>
            <button onclick="setView('tasks')" id="nav-tasks" class="w-12 h-12 rounded-full flex items-center justify-center transition-all"><i class="fa-solid fa-check-double"></i></button>
            <button onclick="setView('dreams')" id="nav-dreams" class="w-12 h-12 rounded-full flex items-center justify-center transition-all"><i class="fa-solid fa-cloud"></i></button>
        </nav>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden items-center justify-center p-6 z-50">
        <div class="bg-zinc-900 w-full max-w-sm rounded-[2rem] p-8 animate-pop shadow-2xl border border-zinc-800">
            <h2 class="text-xl font-bold mb-6 text-white" id="modal-title">New Entry</h2>
            <div id="modal-fields" class="space-y-4"></div>
            <div class="mt-8 flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-4 rounded-2xl bg-zinc-800 font-bold text-zinc-400 hover:bg-zinc-700 transition-colors">Cancel</button>
                <button onclick="saveItem()" class="flex-1 py-4 rounded-2xl bg-white text-black font-bold shadow-lg hover:bg-slate-100 transition-colors">Save</button>
            </div>
        </div>
    </div>

    <script>
        // --- APP LOGIC ---
        let state = JSON.parse(localStorage.getItem('asim_ledger_v3')) || {
            tasks: [], memos: [], ledger: [], projects: [], dreams: []
        };
        let currentView = 'memos';

        function requestNotificationPermission() {
            if ("Notification" in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") new Notification("Asim's Ledger", { body: "Notifications enabled!" });
                });
            }
        }

        function saveToLocal() {
            localStorage.setItem('asim_ledger_v3', JSON.stringify(state));
            render();
        }

        function setView(view) {
            currentView = view;
            const titles = { memos: 'Memos', projects: 'Projects', ledger: 'Spendature', tasks: 'Tasks', dreams: 'Dreams' };
            document.getElementById('view-title').innerText = titles[view];
            ['memos', 'projects', 'ledger', 'tasks', 'dreams'].forEach(v => {
                const btn = document.getElementById(`nav-${v}`);
                btn.className = v === view ? 
                    'w-12 h-12 rounded-full flex items-center justify-center tab-active' : 
                    'w-12 h-12 rounded-full flex items-center justify-center text-zinc-500 hover:text-zinc-300';
            });
            render();
        }

        function render() {
            const container = document.getElementById('content-area');
            const search = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = '';

            if (currentView === 'memos') {
                state.memos.forEach((m, i) => {
                    if (search && !m.title.toLowerCase().includes(search)) return;
                    container.innerHTML += `
                        <div class="bg-zinc-900/60 p-6 rounded-3xl mb-4 border border-zinc-800/50 animate-pop">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-lg text-white">${m.title}</h3>
                                <div class="flex gap-2">
                                    <button onclick="moveMemo(${i}, -1)" class="text-zinc-600 hover:text-zinc-200"><i class="fa-solid fa-chevron-up"></i></button>
                                    <button onclick="moveMemo(${i}, 1)" class="text-zinc-600 hover:text-zinc-200"><i class="fa-solid fa-chevron-down"></i></button>
                                    <button onclick="deleteMemo(${i})" class="text-zinc-600 hover:text-red-400 ml-2"><i class="fa-solid fa-trash-can"></i></button>
                                </div>
                            </div>
                            <p class="text-sm text-zinc-400 leading-relaxed">${m.body}</p>
                        </div>`;
                });
            } else if (currentView === 'projects') {
                state.projects.forEach((p, i) => {
                    if (search && !p.name.toLowerCase().includes(search)) return;
                    let adds = (p.items || []).filter(it => it.type === 'add').reduce((a, b) => a + parseFloat(b.cost || 0), 0);
                    let subs = (p.items || []).filter(it => it.type === 'sub').reduce((a, b) => a + parseFloat(b.cost || 0), 0);
                    let bal = (p.budget || 0) + adds - subs;
                    container.innerHTML += `
                        <div class="bg-zinc-900/60 p-6 rounded-3xl mb-6 border border-zinc-800/50 animate-pop">
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="font-black text-xl text-white uppercase">${p.name}</h3>
                                <button onclick="deleteProject(${i})" class="text-zinc-600 hover:text-red-400"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                            <div class="grid grid-cols-3 gap-2 text-[10px] font-bold uppercase mb-4 text-center">
                                <div class="bg-black/50 p-2 rounded-xl text-zinc-500">Base: ${p.budget}</div>
                                <div class="bg-emerald-950/20 p-2 rounded-xl text-emerald-400">Add: +${adds}</div>
                                <div class="bg-red-950/20 p-2 rounded-xl text-red-400">Spent: -${subs}</div>
                            </div>
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-bold text-zinc-600 uppercase">Balance</span>
                                <span class="text-sm font-black ${bal < 0 ? 'text-red-400' : 'text-white'}">${bal}</span>
                            </div>
                            <div class="w-full bg-black h-2 rounded-full overflow-hidden mb-4">
                                <div class="bg-white h-full" style="width: ${Math.min((subs/((p.budget || 0) + adds || 1))*100, 100)}%"></div>
                            </div>
                            <div class="space-y-1 mb-4 max-h-32 overflow-y-auto no-scrollbar">
                                ${(p.items || []).map(item => `<div class="flex justify-between text-[11px] py-1 border-b border-zinc-800/30"><span class="text-zinc-500">${item.label}</span><span class="${item.type === 'add' ? 'text-emerald-400' : 'text-zinc-200'} font-bold">${item.type === 'add' ? '+' : '-'}${item.cost}</span></div>`).join('')}
                            </div>
                            <div class="flex gap-2">
                                <button onclick="addProjTx(${i}, 'add')" class="flex-1 py-3 rounded-xl bg-emerald-900/20 text-emerald-400 text-[10px] font-black uppercase">Add Funds</button>
                                <button onclick="addProjTx(${i}, 'sub')" class="flex-1 py-3 rounded-xl bg-red-900/20 text-red-400 text-[10px] font-black uppercase">Expense</button>
                            </div>
                        </div>`;
                });
            } else if (currentView === 'ledger') {
                let inc = state.ledger.filter(l => l.type === 'income').reduce((a, b) => a + parseFloat(b.amount || 0), 0);
                let exp = state.ledger.filter(l => l.type === 'expense').reduce((a, b) => a + parseFloat(b.amount || 0), 0);
                container.innerHTML = `
                    <div class="bg-white text-black p-8 rounded-3xl mb-6 shadow-2xl animate-pop">
                        <p class="text-[10px] font-bold uppercase opacity-60 tracking-widest">Net Cashflow</p>
                        <h2 class="text-4xl font-black mb-4">${(inc - exp).toLocaleString()}</h2>
                        <div class="flex justify-between items-center border-t border-zinc-100 pt-4">
                            <div class="flex gap-4">
                                <div><span class="block text-[9px] opacity-60 uppercase font-bold">In</span><span class="text-emerald-600 font-bold">+${inc}</span></div>
                                <div><span class="block text-[9px] opacity-60 uppercase font-bold">Out</span><span class="text-red-600 font-bold">-${exp}</span></div>
                            </div>
                            <button onclick="downloadLedgerPDF()" class="p-3 bg-zinc-100 rounded-xl"><i class="fa-solid fa-file-pdf"></i></button>
                        </div>
                    </div>`;
                state.ledger.forEach((l, i) => {
                    if (search && !l.item.toLowerCase().includes(search)) return;
                    container.innerHTML += `
                        <div class="bg-zinc-900/60 p-4 rounded-2xl mb-3 flex justify-between items-center border border-zinc-800/30 animate-pop">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full ${l.type === 'income' ? 'bg-emerald-400/10 text-emerald-400' : 'bg-red-400/10 text-red-400'} flex items-center justify-center text-[10px]"><i class="fa-solid ${l.type === 'income' ? 'fa-plus' : 'fa-minus'}"></i></div>
                                <div class="flex flex-col"><span class="font-bold text-sm text-zinc-200">${l.item}</span><span class="text-[8px] text-zinc-600 uppercase">${l.date}</span></div>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="font-black ${l.type === 'income' ? 'text-emerald-400' : 'text-white'}">${l.type === 'income' ? '+' : '-'}${l.amount}</span>
                                <button onclick="deleteLedgerItem(${i})" class="text-zinc-700 hover:text-red-400"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                        </div>`;
                });
            } else if (currentView === 'tasks') {
                state.tasks.forEach((t, i) => {
                    if (search && !t.text.toLowerCase().includes(search)) return;
                    container.innerHTML += `
                        <div class="bg-zinc-900/60 p-4 rounded-2xl mb-3 flex items-center justify-between border-l-4 ${t.done ? 'border-zinc-800' : 'border-white'} animate-pop">
                            <div class="flex items-center gap-4">
                                <button onclick="toggleTask(${i})" class="w-6 h-6 rounded-full border-2 border-zinc-700 flex items-center justify-center ${t.done ? 'bg-white border-white text-black' : ''}">${t.done ? '<i class="fa-solid fa-check text-[10px]"></i>' : ''}</button>
                                <span class="text-sm font-medium ${t.done ? 'line-through text-zinc-600' : 'text-zinc-200'}">${t.text}</span>
                            </div>
                            <span class="text-[9px] font-black uppercase text-zinc-500">${t.date || 'DUE'}</span>
                        </div>`;
                });
            } else if (currentView === 'dreams') {
                state.dreams.forEach((d, i) => {
                    if (search && !d.name.toLowerCase().includes(search)) return;
                    let saved = (d.items || []).reduce((a, b) => a + parseFloat(b.amount || 0), 0);
                    let percent = Math.min((saved / (d.goal || 1)) * 100, 100);
                    container.innerHTML += `
                        <div class="bg-zinc-900/60 p-6 rounded-3xl mb-6 border border-zinc-800/50 animate-pop">
                            <div class="flex justify-between items-start mb-4">
                                <div><h3 class="font-black text-xl text-white italic uppercase">${d.name}</h3><p class="text-[9px] text-zinc-500 font-bold uppercase">Goal: ${d.goal.toLocaleString()}</p></div>
                                <button onclick="deleteDream(${i})" class="text-zinc-600 hover:text-red-400"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                            <div class="flex justify-between items-center mb-2"><span class="text-[10px] font-bold text-emerald-400 uppercase">Saved</span><span class="text-lg font-black text-white">${saved.toLocaleString()}</span></div>
                            <div class="w-full bg-black h-3 rounded-full overflow-hidden mb-4 p-[2px]"><div class="bg-gradient-to-r from-emerald-500 to-white h-full rounded-full" style="width: ${percent}%"></div></div>
                            <button onclick="addDreamSaving(${i})" class="w-full py-4 rounded-2xl bg-white text-black text-xs font-black uppercase">Add Savings</button>
                        </div>`;
                });
            }
        }

        function openModal() {
            const fields = document.getElementById('modal-fields');
            const title = document.getElementById('modal-title');
            fields.innerHTML = '';
            const cls = "w-full p-4 rounded-2xl bg-black text-white border-zinc-800 border focus:ring-1 ring-white/20";
            if (currentView === 'memos') {
                title.innerText = "New Memo";
                fields.innerHTML = `<input id="m-t" placeholder="Subject" class="${cls}"><textarea id="m-b" placeholder="Content..." class="${cls} h-32"></textarea>`;
            } else if (currentView === 'projects') {
                title.innerText = "New Project";
                fields.innerHTML = `<input id="p-n" placeholder="Title" class="${cls}"><input id="p-b" type="number" placeholder="Budget" class="${cls}">`;
            } else if (currentView === 'dreams') {
                title.innerText = "Dream Goal";
                fields.innerHTML = `<input id="d-n" placeholder="Dream" class="${cls}"><input id="d-g" type="number" placeholder="Goal" class="${cls}">`;
            } else if (currentView === 'ledger') {
                title.innerText = "Ledger Entry";
                fields.innerHTML = `<select id="l-t" class="${cls}"><option value="expense">Expense</option><option value="income">Income</option></select><input id="l-i" placeholder="For what?" class="${cls}"><input id="l-a" type="number" placeholder="Amount" class="${cls}">`;
            } else if (currentView === 'tasks') {
                title.innerText = "New Task";
                fields.innerHTML = `<input id="t-x" placeholder="To do?" class="${cls}"><input id="t-d" type="date" class="${cls}">`;
            }
            document.getElementById('modal').classList.replace('hidden', 'flex');
        }

        function closeModal() { document.getElementById('modal').classList.replace('flex', 'hidden'); }

        function saveItem() {
            const dateStr = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
            if (currentView === 'memos') {
                const t = document.getElementById('m-t').value;
                const b = document.getElementById('m-b').value;
                if(t) state.memos.unshift({ title: t, body: b });
            } else if (currentView === 'projects') {
                const n = document.getElementById('p-n').value;
                const b = document.getElementById('p-b').value;
                if(n) state.projects.unshift({ name: n, budget: parseFloat(b) || 0, items: [] });
            } else if (currentView === 'dreams') {
                const n = document.getElementById('d-n').value;
                const g = document.getElementById('d-g').value;
                if(n) state.dreams.unshift({ name: n, goal: parseFloat(g) || 0, items: [] });
            } else if (currentView === 'ledger') {
                const i = document.getElementById('l-i').value;
                const a = document.getElementById('l-a').value;
                const t = document.getElementById('l-t').value;
                if(i && a) state.ledger.unshift({ item: i, amount: a, type: t, date: dateStr });
            } else if (currentView === 'tasks') {
                const x = document.getElementById('t-x').value;
                const d = document.getElementById('t-d').value;
                if(x) state.tasks.unshift({ text: x, date: d, done: false });
            }
            saveToLocal(); closeModal();
        }

        function addDreamSaving(idx) {
            const amt = prompt("Amount saved?");
            if (amt && !isNaN(amt)) {
                state.dreams[idx].items = state.dreams[idx].items || [];
                state.dreams[idx].items.unshift({ amount: parseFloat(amt), date: 'Today' });
                saveToLocal();
            }
        }

        function addProjTx(idx, type) {
            const lbl = prompt("Description:");
            const cst = prompt("Amount?");
            if (lbl && cst) {
                state.projects[idx].items = state.projects[idx].items || [];
                state.projects[idx].items.unshift({ label: lbl, cost: parseFloat(cst), type });
                saveToLocal();
            }
        }

        function toggleTask(i) { state.tasks[i].done = !state.tasks[i].done; saveToLocal(); }
        function deleteMemo(i) { if(confirm("Delete?")) { state.memos.splice(i, 1); saveToLocal(); } }
        function deleteProject(i) { if(confirm("Delete?")) { state.projects.splice(i, 1); saveToLocal(); } }
        function deleteDream(i) { if(confirm("Delete?")) { state.dreams.splice(i, 1); saveToLocal(); } }
        function deleteLedgerItem(i) { state.ledger.splice(i, 1); saveToLocal(); }
        function moveMemo(i, d) {
            const t = i + d;
            if (t >= 0 && t < state.memos.length) {
                [state.memos[i], state.memos[t]] = [state.memos[t], state.memos[i]];
                saveToLocal();
            }
        }

        async function downloadLedgerPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Asim's Ledger Report", 14, 20);
            let y = 30;
            state.ledger.forEach(l => {
                doc.text(`${l.date} | ${l.item} | ${l.type === 'income' ? '+' : '-'}${l.amount}`, 14, y);
                y += 10;
            });
            doc.save(`Ledger_${Date.now()}.pdf`);
        }

        window.onload = () => setView('memos');
    </script>
</body>
</html>
